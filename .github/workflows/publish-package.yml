name: Publish package to npm Packages

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write
  id-token: write # REQUIRED for npm OIDC Trusted Publishing

jobs:
  release:
    runs-on: ubuntu-22.04
    environment: npm-publish # must match Trusted Publisher config on npmjs.com

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v6.0.8
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
          scope: '@scallop-io'

      - name: Upgrade npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build
        run: pnpm run build

      - name: Determine npm tag
        id: npm_tag
        run: |
          if [[ "${{ github.ref_name }}" == *"alpha."* ]]; then
            echo "tag=alpha" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == *"rc."* ]]; then
            echo "tag=rc" >> $GITHUB_ENV
          else
            echo "tag=latest" >> $GITHUB_ENV
          fi

      # Publish to npmjs.com via OIDC — use npm (not pnpm) for OIDC token exchange
      - name: Publish to npmjs.com (OIDC)
        run: npm publish --tag ${{ env.tag }} --access public --ignore-scripts
